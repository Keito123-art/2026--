name: 部署到 GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
     steps:
      # 1. 下载你的代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js (版本 18)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. 安装依赖 (注意：这里指定了目录)
      - name: Install dependencies
        working-directory: ./vue-project
        run: npm install

      # 4. 打包项目 (注意：这里也指定了目录)
      - name: Build
        working-directory: ./vue-project
        run: npm run build

      # 5. 上传文件 (注意：这里指明了 dist 的位置)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./vue-project/dist
    
